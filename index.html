<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zubin Tagore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .name {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #f0f0f0;
    }

    .dot {
      color: #888;
    }

    .status {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="name">Zubin Tagore<span class="dot">.</span></h1>
    <p class="status">
      <span class="pulse"></span>
      Coming soon
    </p>
  </div>
</body>
</html>
