<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubin Tagore</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: "Cormorant Garamond", serif;
  background: #0e0d0b;
  color: #f0ebe0;
  overflow: hidden;
}

.frame {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 40px 24px;
  gap: 0;
}

.name {
  font-size: clamp(64px, 10vw, 120px);
  font-weight: 300;
  letter-spacing: 0.04em;
  line-height: 1;
  text-align: center;
  color: #f0ebe0;
}

.sub {
  font-family: "DM Mono", monospace;
  font-weight: 300;
  font-size: clamp(11px, 1.4vw, 14px);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(240,235,224,0.4);
  margin-top: 20px;
  text-align: center;
}

.divider {
  width: 1px;
  height: 80px;
  background: rgba(240,235,224,0.12);
  margin: 52px 0 48px;
}

.nodes {
  display: flex;
  gap: clamp(28px, 6vw, 80px);
  align-items: center;
}

.node {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.25s;
}
.node:hover { opacity: 0.65; }

.node-circle {
  width: clamp(72px, 9vw, 108px);
  height: clamp(72px, 9vw, 108px);
  border-radius: 50%;
  border: 1px solid rgba(240,235,224,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.25s, background 0.25s;
}
.node:hover .node-circle {
  border-color: rgba(240,235,224,0.45);
  background: rgba(240,235,224,0.04);
}

.node-glyph {
  font-size: clamp(22px, 3vw, 34px);
  font-weight: 300;
  color: rgba(240,235,224,0.55);
  line-height: 1;
}

.node-label {
  font-family: "DM Mono", monospace;
  font-size: clamp(9px, 1vw, 11px);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(240,235,224,0.35);
}

.connector {
  width: clamp(40px, 6vw, 80px);
  height: 1px;
  background: rgba(240,235,224,0.1);
}
</style>
</head>
<body>

<!-- ── PASSWORD GATE ── -->
<div id="pw-gate" style="
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:#0e0d0b;
  flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;
">
  <p style="font-family:'DM Mono',monospace;font-weight:300;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(240,235,224,0.4);">enter password</p>
  <input id="pw-input" type="password" autocomplete="current-password"
    style="
      background:transparent;
      border:none;border-bottom:1px solid rgba(240,235,224,0.18);
      color:#f0ebe0;font-family:'DM Mono',monospace;font-size:1rem;
      letter-spacing:0.2em;text-align:center;
      width:160px;padding:8px 0;outline:none;
    "
    placeholder="••••••••"
  />
  <p id="pw-err" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#c0392b;opacity:0;transition:opacity 0.3s;">incorrect</p>
</div>
<script>
(function(){
  var KEY='zt_auth', PASS='1234';
  var gate=document.getElementById('pw-gate');
  var inp=document.getElementById('pw-input');
  var err=document.getElementById('pw-err');
  if(sessionStorage.getItem(KEY)==='1'){gate.style.display='none';return;}
  gate.style.display='flex';
  document.body.style.overflow='hidden';
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      if(inp.value===PASS){
        sessionStorage.setItem(KEY,'1');
        gate.style.opacity='0';
        gate.style.transition='opacity 0.4s';
        setTimeout(function(){gate.style.display='none';document.body.style.overflow='';},400);
      } else {
        inp.value='';
        err.style.opacity='1';
        setTimeout(function(){err.style.opacity='0';},2000);
      }
    }
  });
  setTimeout(function(){inp.focus();},50);
})();
</script>
<!-- ── END PASSWORD GATE ── -->

<div class="frame">
  <div class="name">Zubin Tagore</div>
  <div class="sub">Political Science &nbsp;·&nbsp; UCLA &nbsp;·&nbsp; Los Angeles</div>

  <div class="divider"></div>

  <div class="nodes">
    <a href="about.html" class="node">
      <div class="node-circle">
        <span class="node-glyph">◦</span>
      </div>
      <span class="node-label">About</span>
    </a>

    <div class="connector"></div>

    <a href="classes.html" class="node">
      <div class="node-circle">
        <span class="node-glyph">◦</span>
      </div>
      <span class="node-label">Quarter Dashboard</span>
    </a>
  </div>
</div>

</body>
</html>
