<div id="pw-gate" style="

      background:transparent;
      border:none;border-bottom:1px solid rgba(240,235,224,0.18);
      color:#f0ebe0;font-family:'DM Sans',sans-serif;font-size:1rem;
      letter-spacing:0.2em;text-align:center;
      width:160px;padding:8px 0;outline:none;
    "
    placeholder="••••••••"
  />
  <p id="pw-err" style="font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.1em;color:#c0392b;opacity:0;transition:opacity 0.3s;">incorrect</p>
</div>
<script>
(function(){
  var KEY='zt_auth', PASS='1234';
  var gate=document.getElementById('pw-gate');
  var inp=document.getElementById('pw-input');
  var err=document.getElementById('pw-err');
  if(sessionStorage.getItem(KEY)==='1'){gate.style.display='none';return;}
  gate.style.display='flex';
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      if(inp.value===PASS){
        sessionStorage.setItem(KEY,'1');
        gate.style.opacity='0';
        gate.style.transition='opacity 0.4s';
        setTimeout(function(){gate.style.display='none';},400);
      } else {
        inp.value='';
        err.style.opacity='1';
        setTimeout(function(){err.style.opacity='0';},2000);
      }
    }
  });
  setTimeout(function(){inp.focus();},50);
})();
</script>

}

}
function getWeekNumber(dateStr) {

            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 20 }}>
              <button onClick={() => setCalMonth(Math.max(2, calMonth - 1))} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>‹</button>
              <div style={{ fontFamily: "'Newsreader',serif", fontSize: 24, fontWeight: 700 }}>{monthNames[calMonth]} 2026</div>
              <button onClick={() => setCalMonth(Math.min(5, calMonth + 1))} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#999" }}>›</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
              {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map((d) => (
                <div key={d} style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 10, fontWeight: 600, textAlign: "center", color: "#bbb", letterSpacing: 1, textTransform: "uppercase", padding: 4 }}>{d}</div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
              {calendarDays.map((day, i) => {
                const evts = eventsForDay(day);
                const today = isToday(day);
                return (
                  <div key={i} style={{ minHeight: 80, background: day ? (today ? "#FFFBEF" : "#fff") : "transparent", borderRadius: 8, padding: day ? 6 : 0, border: today ? "2px solid #E8A33E" : "1px solid #f0ede8" }}>
                    {day && (
                      <>
                        <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, fontWeight: today ? 700 : 400, color: today ? "#E8A33E" : "#999", marginBottom: 2 }}>{day}</div>
                        {evts.slice(0, 3).map((e, j) => (
                          <div key={j} style={{ fontSize: 9, fontFamily: "'DM Sans',sans-serif", fontWeight: 500, padding: "2px 4px", borderRadius: 3, marginBottom: 1, background: e.course ? courseColor(e.course) + "18" : "#eee", color: e.course ? courseColor(e.course) : "#888", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", borderLeft: e.type === "exam" ? `2px solid ${courseColor(e.course) || "#888"}` : "none" }}>
                            {e.type === "exam" ? "⚡ " : ""}{e.label.replace(/^(SOC|PS|ISLM): /, "")}
                          </div>
                        ))}
                        {evts.length > 3 && <div style={{ fontSize: 9, color: "#bbb", fontFamily: "'DM Sans'" }}>+{evts.length - 3} more</div>}
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* TIMELINE */}
        {tab === "timeline" && (
          <div>
            <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: 2, textTransform: "uppercase", color: "#999", marginBottom: 20 }}>Quarter Timeline — Week by Week</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 24, flexWrap: "wrap" }}>
              <button onClick={() => setSelectedCourse(null)} style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, padding: "6px 14px", borderRadius: 20, border: "1px solid #ddd", background: !selectedCourse ? "#1A1A1A" : "#fff", color: !selectedCourse ? "#fff" : "#666", cursor: "pointer", fontWeight: 500 }}>All</button>
              {COURSES.map((c) => (
                <button key={c.id} onClick={() => setSelectedCourse(selectedCourse === c.id ? null : c.id)} style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, padding: "6px 14px", borderRadius: 20, border: `1px solid ${c.color}40`, background: selectedCourse === c.id ? c.color : "#fff", color: selectedCourse === c.id ? "#fff" : c.color, cursor: "pointer", fontWeight: 500 }}>{c.code}</button>
              ))}
            </div>
            {Array.from({ length: 11 }, (_, w) => w + 1).map((week) => {
              const weekEvents = EVENTS
                .filter((e) => getWeekNumber(e.date) === week)
                .filter((e) => !selectedCourse || e.course === selectedCourse || e.course === null)
                .sort((a, b) => a.date.localeCompare(b.date));
              const todayStr = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,"0")}-${String(TODAY.getDate()).padStart(2,"0")}`;
              const currentWeek = getWeekNumber(todayStr);
              const isCurrent = week === currentWeek;
              const isPast = week < currentWeek;
              return (
                <div key={week} style={{ display: "flex", gap: 20, marginBottom: 4, opacity: isPast ? 0.45 : 1 }}>
                  <div style={{ width: 56, flexShrink: 0, textAlign: "right", paddingTop: 12 }}>
                    <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 11, fontWeight: 700, color: isCurrent ? "#E8A33E" : "#bbb" }}>WK {week}</div>
                    {isCurrent && <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 9, color: "#E8A33E", fontWeight: 600 }}>NOW</div>}
                  </div>
                  <div style={{ width: 2, background: isCurrent ? "#E8A33E" : "#e8e4df", borderRadius: 1, position: "relative", flexShrink: 0 }}>
                    {isCurrent && <div style={{ position: "absolute", top: 14, left: -4, width: 10, height: 10, borderRadius: "50%", background: "#E8A33E" }} />}
                  </div>
                  <div style={{ flex: 1, paddingBottom: 12, paddingTop: 8 }}>
                    {weekEvents.length === 0 && <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#ccc", padding: "4px 0" }}>—</div>}
                    {weekEvents.map((e, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 6 }}>
                        <div style={{ width: 6, height: 6, borderRadius: "50%", marginTop: 5, flexShrink: 0, background: e.type === "exam" ? "#E8483E" : e.type === "holiday" ? "#E8A33E" : e.course ? courseColor(e.course) : "#ccc" }} />
                        <div>
                          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: e.type === "exam" ? 700 : 400, color: e.type === "exam" ? "#E8483E" : "#444" }}>{e.label}</div>
                          <div style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 10, color: "#bbb" }}>{formatDate(e.date)}{getDaysUntil(e.date) >= 0 ? ` · ${getDaysUntil(e.date)}d away` : ""}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
